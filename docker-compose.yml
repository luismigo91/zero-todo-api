services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - MONGO_DATA_API_URL=${MONGO_DATA_API_URL}
      - MONGO_API_KEY=${MONGO_API_KEY}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      retries: 5
      start_period: 20s

volumes:
  mongo_data:
